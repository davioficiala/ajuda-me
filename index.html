<!-- FIREBASE -->
<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getFirestore,
doc,
setDoc,
getDoc
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

// FIREBASE
const firebaseConfig = {

apiKey: "AIzaSyCqLLNY80PPacb9zFLmCew4hyfeY0UQnAs",

authDomain: "ensino-62008.firebaseapp.com",

projectId: "ensino-62008",

storageBucket: "ensino-62008.appspot.com",

messagingSenderId: "121950498739",

appId: "1:121950498739:web:5adedf5cdf2aa71ade65c6"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

// MENU
const menuBtn =
document.getElementById("menuBtn");

const menu =
document.getElementById("menu");

menuBtn.onclick = () => {

menu.style.display =
menu.style.display === "block"
? "none"
: "block";

};

// TROCAR PÁGINA
window.showPage = function(page){

document.querySelectorAll(".page")
.forEach(p=>p.classList.remove("active"));

document.getElementById(page)
.classList.add("active");

menu.style.display = "none";

};

// MATÉRIA ATUAL
let materiaAtual = "Português";

// ADMIN
window.setMateria = function(nome){

materiaAtual = nome;

document.getElementById("materiaAtual")
.innerHTML =
"Matéria: " + nome;

document.getElementById("editor").value = "";

};

// SALVAR
window.salvar = async function(){

const texto =
document.getElementById("editor").value;

if(!texto.trim()){

alert("Escreva algo");

return;

}

try{

const ref =
doc(db,"materias",materiaAtual);

const snap =
await getDoc(ref);

let conteudoAntigo = "";

if(snap.exists()){

conteudoAntigo =
snap.data().conteudo;

}

let novoConteudo = "";

if(conteudoAntigo){

novoConteudo =

conteudoAntigo +

"\n\n━━━━━━━━━━━━━━━━━━\n\n"

+

texto;

}else{

novoConteudo = texto;

}

await setDoc(

ref,

{
conteudo: novoConteudo
}

);

alert("Novo conteúdo adicionado!");

document.getElementById("editor").value = "";

}catch(error){

console.log(error);

alert("Erro ao salvar");

}

};

// ALUNO
window.abrir = async function(nome){

const viewer =
document.getElementById("viewer");

viewer.innerHTML =
"Carregando...";

try{

const ref =
doc(db,"materias",nome);

const snap =
await getDoc(ref);

if(snap.exists()){

viewer.innerHTML =
snap.data().conteudo;

}else{

viewer.innerHTML =
"Sem conteúdo em " + nome;

}

}catch(error){

console.log(error);

viewer.innerHTML =
"Erro ao carregar matéria";

}

};

</script>
